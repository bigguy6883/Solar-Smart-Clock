repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-json

  # Black code formatter
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3
        exclude: '^clock\.py$'

  # Flake8 linter
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--ignore=E501,W503']
        exclude: '^clock\.py$'

  # Mypy type checker
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: ['--ignore-missing-imports', '--no-error-summary']
        additional_dependencies: ['types-requests>=2.31.0', 'types-Pillow>=10.0.0']
        exclude: '^clock\.py$'

  # Pre-push gate: re-run all commit-stage hooks across the whole repo, then pytest.
  # Catches stale issues in unchanged files (the kind that previously surprised us
  # via failing CI emails after a push).
  - repo: local
    hooks:
      - id: pre-commit-all-files
        name: pre-commit run --all-files
        entry: ./venv/bin/pre-commit run --all-files --hook-stage pre-commit
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
      - id: pytest
        name: pytest
        entry: ./venv/bin/pytest tests/ -q
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
